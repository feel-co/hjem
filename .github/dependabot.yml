version: 2
updates:
  - package-ecosystem: github-actions
    open-pull-requests-limit: 15
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: "/cli"
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns:
          - "*"

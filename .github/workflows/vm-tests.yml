name: Run VM tests

on:
  merge_group:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
jobs:
  vm-tests:
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        include:
          - os: ubuntu-latest # x86
            system: "x86_64-linux"
            test: nixos-basic
          - os: ubuntu-22.04-arm # aarch64
            system: "aarch64-linux"
            test: nixos-basic
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-special-args
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-special-args
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-linker
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-linker
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-xdg-linker
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-xdg-linker
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-xdg
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-xdg
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-no-users-linker
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-no-users-linker
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-systemd-reload
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-systemd-reload
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: finix-basic
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: finix-basic
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: finix-xdg
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: finix-xdg
          - os: ubuntu-latest
            system: "x86_64-linux"
            test: nixos-standalone
          - os: ubuntu-22.04-arm
            system: "aarch64-linux"
            test: nixos-standalone

    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = kvm nixos-test
            allow-import-from-derivation = false

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Build packages
        run: nix build -L .#checks.${{ matrix.system }}.${{ matrix.test }}
